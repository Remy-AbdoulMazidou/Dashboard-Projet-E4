version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8050:8050"
    environment:
      - PORT=8050
      - DEBUG=false
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
